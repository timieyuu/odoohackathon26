}

  transform: translateY(1px) scale(0.98);

  background:var(--paper); 
  border:1px solid var(--line); 
  border-radius:1.25rem;

}

}

.input-field{ border:1px solid var(--line); border-radius:.6rem; padding:.65rem .75rem; background:#fff; transition:all .2s ease; width:100%; }
.input-field:focus{ outline:none; border-color:var(--orange); box-shadow:0 0 0 3px var(--amber-soft); }

.nav-pill{ transition:all .2s ease; }

.nav-pill:not(.active):hover{ background:#2A241C; color:#fff; transform: translateX(4px); }

.fade-in{ animation:fadeIn .3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

// 1. SEED DATA 
// ==========================================

  { id: 'HR001', name: 'Alice Admin', email: 'admin@hrms.com', password: 'password', role: 'HR', jobTitle: 'HR Director', department: 'Human Resources', avatar: 'https://i.pravatar.cc/150?u=HR001', phone: '555-0101', address: '123 Corporate Blvd', joinDate: '2020-01-15', salary: { basic: 8000, allowances: 1000, deductions: 500, net: 8500 } },
  { id: 'EMP001', name: 'Bob Builder', email: 'bob@hrms.com', password: 'password', role: 'Employee', jobTitle: 'Frontend Engineer', department: 'Engineering', avatar: 'https://i.pravatar.cc/150?u=EMP001', phone: '555-0202', address: '456 Dev Lane', joinDate: '2023-03-10', salary: { basic: 6000, allowances: 500, deductions: 300, net: 6200 } },
  { id: 'EMP002', name: 'Charlie Clark', email: 'charlie@hrms.com', password: 'password', role: 'Employee', jobTitle: 'Product Manager', department: 'Product', avatar: 'https://i.pravatar.cc/150?u=EMP002', phone: '555-0303', address: '789 Vision Way', joinDate: '2022-08-01', salary: { basic: 7500, allowances: 600, deductions: 400, net: 7700 } },
  { id: 'EMP003', name: 'Diana Prince', email: 'diana@hrms.com', password: 'password', role: 'Employee', jobTitle: 'UX Designer', department: 'Design', avatar: 'https://i.pravatar.cc/150?u=EMP003', phone: '555-0404', address: '321 Creative Cir', joinDate: '2024-01-20', salary: { basic: 5500, allowances: 400, deductions: 250, net: 5650 } }

const SEED_LEAVES = [
  { id: 1, userId: 'EMP001', type: 'Paid', startDate: '2026-07-10', endDate: '2026-07-12', remarks: 'Vacation', status: 'Pending', adminComment: '' },
  { id: 2, userId: 'EMP002', type: 'Sick', startDate: '2026-06-25', endDate: '2026-06-26', remarks: 'Flu', status: 'Approved', adminComment: 'Rest well.' },
  { id: 3, userId: 'EMP003', type: 'Unpaid', startDate: '2026-07-01', endDate: '2026-07-01', remarks: 'Personal errands', status: 'Rejected', adminComment: 'Need hands on deck for launch.' }
];

const todayStr = new Date().toISOString().split('T')[0];
const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];

const SEED_ATTENDANCE = [
  { userId: 'EMP001', date: todayStr, status: 'Present', checkIn: '09:02 AM', checkOut: '' },
  { userId: 'EMP002', date: yesterdayStr, status: 'Present', checkIn: '08:55 AM', checkOut: '05:10 PM' },
  { userId: 'EMP003', date: todayStr, status: 'Leave', checkIn: '', checkOut: '' }
];

function useDatabase() {
  const [data, setData] = useState({
    users: SEED_USERS,
    leaves: SEED_LEAVES,
    attendance: SEED_ATTENDANCE,
  });
  const updateDb = (key, newData) => setData(prev => ({ ...prev, [key]: newData }));
  return [data, updateDb];
}

function useToast() {
  const [toast, setToast] = useState(null);
  const fire = (message, tone = 'ok') => {
    setToast({ message, tone, key: Date.now() });
    setTimeout(() => setToast(t => (t && t.key === undefined ? null : t)), 0);
  };
  return [toast, fire, setToast];
}

function Toast({ toast, onDone }) {
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(onDone, 2600);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  const tones = {
    ok: 'bg-[var(--ink)] text-white',
    warn: 'bg-[var(--red)] text-white',
  };
  return (
    <div className="fixed bottom-6 right-6 z-50 fade-in">
      <div className={`px-5 py-3 rounded-xl shadow-2xl text-sm font-medium ${tones[toast.tone] || tones.ok}`}>
        {toast.message}
      </div>
    </div>
  );
}

// ---------------------------------------------------------
// NEW AVATAR COMPONENT (Removes default PFP requirements)
// ---------------------------------------------------------
const Avatar = ({ user, size = 'md', className = '' }) => {
    const sizeClasses = {
        sm: 'w-8 h-8 text-xs',
        md: 'w-10 h-10 text-sm',
        lg: 'w-24 h-24 text-2xl',
        xl: 'w-32 h-32 text-4xl'
    };
    const dimensions = sizeClasses[size] || sizeClasses.md;

    const getInitials = (name) => {
        if (!name) return '?';
        const parts = name.trim().split(' ');
        return parts.length > 1 
            ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() 
            : parts[0][0].toUpperCase();
    };

    if (user?.avatar) {
        return (
            <img 
                src={user.avatar} 
                alt={`${user?.name}'s profile`} 
                className={`${dimensions} rounded-full object-cover shadow-sm ${className}`} 
            />
        );
    }

    // Modern Initials Avatar Layout
    return (
        <div className={`${dimensions} rounded-full flex items-center justify-center bg-[var(--ink)] text-[var(--cream)] font-bold tracking-wider shadow-inner ${className}`}>
            {getInitials(user?.name)}
        </div>
    );
};

// Reusable avatar-with-upload control updated to use the new Avatar
function AvatarUpload({ user, editable, onChange }) {
  const inputRef = useRef(null);
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => onChange(reader.result);
    reader.readAsDataURL(file);
  };
  return (
    <div className="relative inline-block">
      <Avatar user={user} size="lg" className="avatar-ring" />
      {editable && (
        <button
          type="button"
          onClick={() => inputRef.current && inputRef.current.click()}
          className="absolute -bottom-1 -right-1 w-8 h-8 rounded-full bg-[var(--orange)] text-white flex items-center justify-center shadow-md hover:bg-[var(--orange-deep)] transition-transform hover:scale-105"
          title="Change photo"
        >
          <Icon name="camera" className="w-4 h-4" />
        </button>
      )}
      <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
    </div>
  );
}

function StatBlock({ eyebrow, value, caption, className = "" }) {
  return (
    <div className={`bg-[var(--orange)] text-white rounded-[1.25rem] p-6 flex flex-col justify-between shadow-lg ${className}`}
         style={{ backgroundImage: 'linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%)' }}>
      <p className="label-eyebrow text-white/80">{eyebrow}</p>
      <p className="font-display text-4xl font-semibold mt-3">{value}</p>
      {caption && <p className="text-sm text-white/85 mt-2">{caption}</p>}
    </div>
  );
}

// ==========================================
// 2. AUTHENTICATION
// ==========================================
function Auth({ onLogin, db, updateDb }) {
  const [isLogin, setIsLogin] = useState(true);
  const [form, setForm] = useState({ email: '', password: '', role: 'Employee', name: '', id: '' });
  const [error, setError] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    setError('');
    if (isLogin) {
      const user = db.users.find(u => u.email === form.email && u.password === form.password);
      if (user) {
        onLogin(user);
      } else {
        setError('Invalid email or password.');
      }
    } else {
      if (db.users.find(u => u.email === form.email || u.id === form.id)) {
        setError('An account with this email or ID already exists.');
        return;
      }
      const newUser = {
        id: form.id, name: form.name, email: form.email, password: form.password, role: form.role,
        jobTitle: 'New Hire', department: 'TBD', 
        avatar: '', // NO default image applied here
        phone: '-', address: '-', joinDate: todayStr,
        salary: { basic: 0, allowances: 0, deductions: 0, net: 0 }
      };
      updateDb('users', [...db.users, newUser]);
      setIsLogin(true);
      setForm({ email: form.email, password: '', role: 'Employee', name: '', id: '' });
      setError('success:Account created — sign in below.');
    }
  };

  const isSuccess = error.startsWith('success:');
  const message = isSuccess ? error.replace('success:', '') : error;

  return (
    <div className="min-h-screen flex bg-[var(--ink)]">
      <div className="hidden lg:flex w-1/2 relative flex-col justify-between p-12 overflow-hidden"
           style={{ backgroundImage: 'radial-gradient(circle at 20% 15%, #3B2C1E 0%, #1B1712 55%, #100D09 100%)' }}>
        <div>
          <p className="label-eyebrow text-white/60">People &amp; Payroll, in one place</p>
          <h1 className="font-display text-white text-5xl lg:text-6xl leading-[1.05] mt-5 max-w-md">
            Run your workday, <span className="italic text-[var(--orange)]">simpler.</span>
          </h1>
          <p className="text-white/60 mt-6 max-w-sm text-[15px] leading-relaxed">
            Attendance, leave, payroll and profiles for the whole team — no upfront setup, no spreadsheets.
          </p>
        </div>
        <div className="grid grid-cols-2 gap-4 max-w-md">
          <StatBlock eyebrow="Checked in today" value={`${db.attendance.filter(a => a.date === todayStr && a.checkIn).length}/${db.users.length}`} caption="Live attendance" />
          <div className="bg-white/5 border border-white/10 rounded-[1.25rem] p-6 flex flex-col justify-between">
            <p className="label-eyebrow text-white/50">Pending leave</p>
            <p className="font-display text-4xl font-semibold mt-3 text-white">{db.leaves.filter(l => l.status === 'Pending').length}</p>
            <p className="text-sm text-white/50 mt-2">Awaiting HR review</p>
          </div>
        </div>
      </div>
      
      <div className="flex-1 flex items-center justify-center bg-[var(--cream)] px-6 py-12">
        <div className="max-w-md w-full">
          <div className="mb-8 fade-in">
            <div className="w-10 h-10 rounded-xl bg-[var(--orange)] flex items-center justify-center mb-6 shadow-md">
              <span className="text-white font-display font-bold text-xl">F</span>
            </div>
            <h2 className="font-display text-4xl font-semibold text-[var(--ink)] tracking-tight">
              {isLogin ? 'Welcome back' : 'Create your account'}
            </h2>
            <p className="text-[var(--ink-soft)] mt-2 text-md">
              {isLogin ? 'Sign in to Fieldhouse HR.' : 'Set up access for a new team member.'}
            </p>
          </div>
          
          {message && (
            <div className={`p-4 mb-6 rounded-xl text-sm font-medium fade-in ${isSuccess ? 'bg-[var(--green-soft)] text-[var(--green)] border border-[var(--green)]/20' : 'bg-[var(--red-soft)] text-[var(--red)] border border-[var(--red)]/20'}`}>
              {message}
            </div>
          )}
          
          <form onSubmit={handleSubmit} className="space-y-5 fade-in">
            {!isLogin && (
              <>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="label-eyebrow block mb-1.5">Employee ID</label>
                    <input type="text" required className="input-field" placeholder="EMP004"
                           value={form.id} onChange={e => setForm({ ...form, id: e.target.value })} />
                  </div>
                  <div>
                    <label className="label-eyebrow block mb-1.5">Role</label>
                    <select className="input-field" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}>
                      <option value="Employee">Employee</option>
                      <option value="HR">HR / Admin</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label className="label-eyebrow block mb-1.5">Full name</label>
                  <input type="text" required className="input-field" placeholder="Jordan Lee"
                         value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                </div>
              </>
            )}
            <div>
              <label className="label-eyebrow block mb-1.5">Email address</label>
              <input type="email" required className="input-field" placeholder="you@company.com"
                     value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
            </div>
            <div>
              <label className="label-eyebrow block mb-1.5">Password</label>
              <input type="password" required className="input-field" placeholder="••••••••"
                     value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} />
            </div>
            <button type="submit" className="btn-primary w-full py-3 rounded-xl font-semibold text-md mt-2">
              {isLogin ? 'Sign in' : 'Create account'}
            </button>
          </form>
          
          <div className="mt-8 text-center fade-in">
            <button onClick={() => { setIsLogin(!isLogin); setError(''); }} className="text-[var(--orange-deep)] hover:underline text-sm font-medium">
              {isLogin ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}
            </button>
          </div>
          
          <div className="mt-10 border-t border-[var(--line)] pt-5 text-xs text-[var(--ink-soft)] text-center font-mono fade-in">
            Demo: admin@hrms.com / password &nbsp;·&nbsp; bob@hrms.com / password
          </div>
        </div>
      </div>
    </div>
  );
}

  return (
    <div className="flex h-screen bg-[var(--cream)]">
      <aside className="w-64 bg-[var(--ink)] flex flex-col shadow-2xl z-10">

      </div>

        <h3 className="font-display text-xl font-semibold mb-5">Recent activity</h3>

    </div>
  );
}

function Profile({ user, db, updateDb, initialSelectedId, notify }) {
  const [selectedUserId, setSelectedUserId] = useState(initialSelectedId || user.id);
  const [editMode, setEditMode] = useState(false);
  const targetUser = db.users.find(u => u.id === selectedUserId) || user;
  const [formData, setFormData] = useState({ ...targetUser });

  useEffect(() => { setFormData({ ...targetUser }); }, [selectedUserId, targetUser.id, targetUser.avatar, targetUser.name]);

  const isAdmin = user.role === 'HR';
  const isSelf = targetUser.id === user.id;
  const canEditBasics = isAdmin || isSelf;
  const canEditAdminFields = isAdmin; 

  const handleSave = () => {
    const updatedUsers = db.users.map(u => u.id === formData.id ? formData : u);
    updateDb('users', updatedUsers);
    setEditMode(false);
    notify(`Saved changes for ${formData.name}.`);
  };

  return (
    <div className="space-y-8 max-w-4xl">
      <div className="flex justify-between items-end flex-wrap gap-4">
        <div>
          <p className="label-eyebrow">Employee record</p>
          <h2 className="font-display text-4xl font-semibold text-[var(--ink)] mt-2 tracking-tight">Profile</h2>
        </div>
        {isAdmin && (
          <select className="input-field w-auto shadow-sm" value={selectedUserId}
            onChange={e => { setSelectedUserId(e.target.value); setEditMode(false); }}>
            {db.users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.id})</option>)}
          </select>
        )}
